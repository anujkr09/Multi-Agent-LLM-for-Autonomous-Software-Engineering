<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="System architecture diagram">
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="60" y="70" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="700">Multi-Agent LLM System Architecture</text>
  <text x="60" y="105" fill="#475569" font-family="Arial, sans-serif" font-size="16">Streamlit UI, local ML pipeline, optional real LLM providers, seven agents, execution checks, and evaluation.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:8}
      .blue{fill:#eff6ff;stroke:#2563eb}
      .green{fill:#f0fdf4;stroke:#16a34a}
      .amber{fill:#fffbeb;stroke:#d97706}
      .text{font-family:Arial,sans-serif;fill:#0f172a;font-size:18px;font-weight:700}
      .sub{font-family:Arial,sans-serif;fill:#475569;font-size:13px}
      .line{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="box blue" x="60" y="170" width="190" height="90"/>
  <text class="text" x="88" y="205">User Input</text>
  <text class="sub" x="88" y="232">Natural language</text>
  <rect class="box blue" x="320" y="170" width="210" height="90"/>
  <text class="text" x="350" y="205">Streamlit UI</text>
  <text class="sub" x="350" y="232">Pages and exports</text>
  <rect class="box green" x="600" y="170" width="230" height="90"/>
  <text class="text" x="625" y="205">Agent Orchestrator</text>
  <text class="sub" x="625" y="232">Coordinates workflow</text>
  <rect class="box" x="930" y="125" width="210" height="80"/>
  <text class="text" x="955" y="158">ML/NLP Pipeline</text>
  <text class="sub" x="955" y="184">TF-IDF, NB, cosine</text>
  <rect class="box" x="930" y="230" width="210" height="80"/>
  <text class="text" x="955" y="263">LLM Provider</text>
  <text class="sub" x="955" y="289">Local, OpenAI, HF</text>
  <rect class="box amber" x="100" y="390" width="260" height="110"/>
  <text class="text" x="130" y="425">Seven Agents</text>
  <text class="sub" x="130" y="452">Analysis, planning, code,</text>
  <text class="sub" x="130" y="472">testing, debug, review, docs</text>
  <rect class="box" x="460" y="390" width="230" height="110"/>
  <text class="text" x="490" y="425">Code Checks</text>
  <text class="sub" x="490" y="452">Syntax parse and smoke</text>
  <text class="sub" x="490" y="472">execution checks</text>
  <rect class="box green" x="790" y="390" width="240" height="110"/>
  <text class="text" x="820" y="425">Evaluation Engine</text>
  <text class="sub" x="820" y="452">Accuracy, relevance,</text>
  <text class="sub" x="820" y="472">quality, completion</text>
  <rect class="box blue" x="320" y="590" width="260" height="80"/>
  <text class="text" x="350" y="623">Final Output</text>
  <text class="sub" x="350" y="649">JSON and Markdown export</text>
  <rect class="box" x="680" y="590" width="240" height="80"/>
  <text class="text" x="710" y="623">SQLite History</text>
  <text class="sub" x="710" y="649">Recent workflow runs</text>
  <path class="line" d="M250 215 H320"/>
  <path class="line" d="M530 215 H600"/>
  <path class="line" d="M830 195 C875 175 890 165 930 165"/>
  <path class="line" d="M830 225 C875 245 890 270 930 270"/>
  <path class="line" d="M715 260 V335 C715 365 345 365 280 390"/>
  <path class="line" d="M360 445 H460"/>
  <path class="line" d="M690 445 H790"/>
  <path class="line" d="M910 500 C910 560 560 552 480 590"/>
  <path class="line" d="M580 630 H680"/>
</svg>
